name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      ConnectionStrings__Postgres: Host=localhost;Port=5432;Database=notifyrail;Username=notifyrail;Password=notifyrail

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: notifyrail
          POSTGRES_USER: notifyrail
          POSTGRES_PASSWORD: notifyrail
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notifyrail -d notifyrail"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release
