services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notifyrail
      POSTGRES_USER: notifyrail
      POSTGRES_PASSWORD: notifyrail
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifyrail -d notifyrail"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
